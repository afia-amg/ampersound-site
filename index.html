<!DOCTYPE html>
<html lang="en">
<head>
<!-- skill:chrome -->
<style>
/* Credit line — bottom-right */
.design-ui-credit {
  position: fixed;
  bottom: 12px;
  right: 12px;
  font: 11px/1 system-ui, sans-serif;
  color: rgba(128,128,128,0.5);
  pointer-events: none;
  z-index: 2147483647;
  transition: opacity 0.4s ease;
  user-select: none;
  letter-spacing: 0.02em;
}

/* Hide chrome on touch devices */
@media (hover: none) {
  .design-ui-credit { display: none; }
}

/* Print fixes */
@media print {
  * {
    transition: none !important;
    animation: none !important;
    box-shadow: none !important;
  }
  body {
    print-color-adjust: exact;
    -webkit-print-color-adjust: exact;
  }
  .design-ui-credit { display: none !important; }
}

</style>
<script>
(function () {
    // Design-ui pages are single compositions, so the whole body is editable.
    function markEditable() {
        document.body.classList.add('artifact-editable');
    }

    // Credit badge with idle-fade. Hover devices only.
    function initChromeUI() {
        if (!matchMedia('(hover: hover)').matches) return;

        var credit = document.createElement('div');
        credit.className = 'design-ui-credit';
        credit.setAttribute('aria-hidden', 'true');
        credit.innerHTML = '\u{1F49C} by ClickUp Brain';
        document.body.appendChild(credit);

        var timer = null;
        var fade = function (out) { credit.style.opacity = out ? '0' : ''; };
        fade(true);
        var show = function () {
            fade(false);
            clearTimeout(timer);
            timer = setTimeout(function () { fade(true); }, 3000);
        };
        document.addEventListener('mousemove', show);
        show();
    }

    function init() {
        markEditable();
        initChromeUI();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();

<script>
const glow = document.getElementById('mouseGlow');
let glowActive = false;
document.addEventListener('mousemove', (e) => { if (!glowActive) { glow.classList.add('active'); glowActive = true; } glow.style.left = e.clientX + 'px'; glow.style.top = e.clientY + 'px'; });
document.addEventListener('mouseleave', () => { glow.classList.remove('active'); glowActive = false; });

const splash = document.getElementById('splash');
function enterSite() { if (splash.classList.contains('exit')) return; splash.classList.add('exit'); setTimeout(() => { splash.style.display = 'none'; document.getElementById('mainNav').classList.add('visible'); document.getElementById('siteContent').classList.add('visible'); document.body.style.overflow = ''; initReveals(); initCounters(); }, 800); }
document.body.style.overflow = 'hidden';
splash.addEventListener('click', enterSite);
window.addEventListener('keydown', function o() { enterSite(); window.removeEventListener('keydown', o); });
window.addEventListener('wheel', function o() { enterSite(); window.removeEventListener('wheel', o); }, { passive: true });
window.addEventListener('touchstart', function o() { enterSite(); window.removeEventListener('touchstart', o); }, { passive: true });

const logo = document.getElementById('splashLogo');
splash.addEventListener('mousemove', (e) => { const rect = logo.getBoundingClientRect(); const cx = rect.left + rect.width / 2; const cy = rect.top + rect.height / 2; const dx = (e.clientX - cx) / rect.width; const dy = (e.clientY - cy) / rect.height; logo.style.transform = `perspective(600px) rotateY(${dx * 12}deg) rotateX(${-dy * 8}deg) scale(1.02)`; });
splash.addEventListener('mouseleave', () => { logo.style.transform = ''; });

function navigate(page) { const current = document.querySelector('.page-view.active'); const target = document.getElementById('page-' + page); if (!target || target === current) return; document.querySelectorAll('.nav-link, .nav-cta').forEach(l => l.classList.remove('active')); const al = document.querySelector(`.nav-links [data-page="${page}"]`); if (al) al.classList.add('active'); if (current) { current.style.opacity='0'; current.style.transform='translateY(-20px)'; setTimeout(()=>{ current.classList.remove('active'); current.style.opacity=''; current.style.transform=''; target.classList.add('active','entering'); window.scrollTo({top:0}); setTimeout(()=>target.classList.remove('entering'),600); initReveals(); initCounters(); },300); } else target.classList.add('active'); document.getElementById('navLinks').classList.remove('open'); }
document.querySelectorAll('[data-page]').forEach(el => { el.addEventListener('click', e => { e.preventDefault(); navigate(el.dataset.page); }); });

function initReveals() { const r=document.querySelectorAll('.page-view.active .reveal'); const o=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting){x.target.classList.add('visible');o.unobserve(x.target);}});},{threshold:0.12,rootMargin:'0px 0px -40px 0px'}); r.forEach(el=>{el.classList.remove('visible');o.observe(el);}); }
function initCounters() { document.querySelectorAll('.page-view.active [data-count]').forEach(el=>{ const t=parseInt(el.dataset.count); const o=new IntersectionObserver(e=>{if(e[0].isIntersecting){const d=1200;const s=performance.now();function tick(n){const p=Math.min((n-s)/d,1);const ea=1-Math.pow(1-p,4);el.textContent=Math.round(ea*t)+(t===100?'%':'+');if(p<1)requestAnimationFrame(tick);}requestAnimationFrame(tick);o.unobserve(el);}},{threshold:0.5}); o.observe(el); }); }

document.getElementById('testimonialForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var formData = new FormData(this);
  var data = Object.fromEntries(formData.entries());
  try {
    var res = await fetch('/.netlify/functions/testimonial-submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (res.ok) {
      document.getElementById('testimonial-form-wrap').style.display = 'none';
      document.getElementById('testimonialSuccess').classList.add('visible');
    } else {
      alert('Something went wrong. Please try again.');
    }
  } catch (err) {
    alert('Connection error. Please try again.');
  }
});

document.getElementById('intakeForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  if (!this.querySelector('[name="name"]').value || !this.querySelector('[name="email"]').value) return;
  var formData = new FormData(this);
  var data = Object.fromEntries(formData.entries());
  data.svc = formData.getAll('svc');
  try {
    var res = await fetch('/.netlify/functions/intake-submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (res.ok) {
      document.getElementById('intake-form-content').style.display = 'none';
      document.getElementById('intakeSuccess').classList.add('visible');
    } else {
      alert('Something went wrong. Please email us at contact@ampersoundmediagroup.com');
    }
  } catch (err) {
    alert('Connection error. Please try again.');
  }
});

initReveals(); initCounters();
</script>
</body>
</html>
